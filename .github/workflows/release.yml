name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          JSON_VERSION=$(grep -o '"version": *"[^"]*"' src/module.json | head -1 | grep -o '"[^"]*"$' | tr -d '"')
          if [ "$TAG_VERSION" != "$JSON_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match module.json version ($JSON_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: |
          mkdir -p dist/weird-dreams
          aarch64-linux-gnu-gcc \
            -O2 -shared -fPIC -ffast-math \
            -o dist/weird-dreams/dsp.so \
            src/dsp/weird_dreams.c \
            -lm
          cp src/module.json dist/weird-dreams/
          if [ -d chain_patches ]; then
            cp -r chain_patches dist/weird-dreams/
          fi

      - name: Create tarball
        run: |
          cd dist
          tar -czf ../weird-dreams-module.tar.gz weird-dreams/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: weird-dreams-module.tar.gz
          generate_release_notes: true

      - name: Update release.json
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          URL="https://github.com/${{ github.repository }}/releases/download/v${TAG}/weird-dreams-module.tar.gz"
          printf '{\n  "version": "%s",\n  "download_url": "%s"\n}\n' "$TAG" "$URL" > release.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release.json
          git diff --cached --quiet && echo "release.json unchanged" || (git commit -m "ci: update release.json for v${TAG}" && git push origin HEAD:master)
